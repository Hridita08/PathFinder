<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PATHFINDER</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2a5298;
        }
        .back-link {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #1e3c72;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>
    <p>Enter your registered email address to verify your account.</p>

    <form action="/check-email" method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <button type="submit">Verify Email</button>
    </form>
    
    <a href="/" class="back-link">Back to Login</a>
</div>

</body>
</html>
