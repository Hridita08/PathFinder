<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | PATHFINDER</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="pf-forgot-page">

    <div class="pf-login-container">

        <!-- Logo + Brand -->
        <div class="pf-logo">
            <img src="logo.png" alt="logo">
            <span class="pf-brand">PATHFINDER</span>
        </div>

        <h2>Forgot Your Password?</h2>

        <p class="pf-description">
            Don’t worry! Enter your email below and we’ll send you a link to reset your password.
        </p>

        <form onsubmit="sendResetEmail(event)">
            <div class="pf-input-group">
                <i class="fa-solid fa-envelope"></i>
                <input
                    type="email"
                    placeholder="email"
                    name="email"
                    autocomplete="email"
                    required>
            </div>

            <button type="submit">Send Reset Link</button>
        </form>

            <div class="pf-forgot" style="margin-top:15px;">
                <a href="login.html" style="text-decoration:none; color:#888995;">Back to Login</a>
            </div>
       

    </div>

</div>

<script>
    // Fade-in animation for the container
    window.addEventListener("DOMContentLoaded", () => {
        const container = document.querySelector(".pf-login-container");
        setTimeout(() => {
            container.classList.add("show");
        }, 100);
    });
    
</script>
<script src="script.js"></script>
</body>
</html>
