<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | PATHFINDER</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="pf-forgot-page">

    <div class="pf-login-container">

        <!-- Logo + Brand -->
        <div class="pf-logo">
            <img src="logo.png" alt="logo">
            <span class="pf-brand">PATHFINDER</span>
        </div>

        <h2>Forgot Your Password?</h2>

        <p class="pf-description">
            Don’t worry! Enter your email below and we’ll send you a link to reset your password.
        </p>

    <!-- action-এ পাইথনের রুট দিতে হবে -->
<form action="/send-reset-link" method="POST">
    <div class="pf-input-group">
        <i class="fa-solid fa-envelope"></i>
        <input 
            type="email" 
            placeholder="Email Address" 
            name="email" 
            required>
    </div>

    
    <button type="submit">Send Reset Link</button>

    <div class="pf-forgot" style="margin-top:15px;">
        <a href="{{ url_for('login_page') }}" style="text-decoration:none; color:#0d1367;">Back to Login</a>
    </div>
</form>
    </div>

</div>

<script>
    // Fade-in animation for the container
    window.addEventListener("DOMContentLoaded", () => {
        const container = document.querySelector(".pf-login-container");
        setTimeout(() => {
            container.classList.add("show");
        }, 100);
    });
</script>

</body>
</html>
