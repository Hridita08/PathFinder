<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PATHFINDER</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e3c72;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Input padding fix */
            font-size: 14px;
        }

        input:focus {
            border-color: #1e3c72;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #16325c;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .links a {
            color: #1e3c72;
            text-decoration: none;
        }

        @media(max-width:400px){
            .login-container { width: 90%; }
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Login to PATHFINDER</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" minlength="4" required>
        
        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="/forgot-password">Forgot Password?</a>
    </div>
</div>

</body>
</html>
