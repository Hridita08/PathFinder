<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PathFinder Login</title>

<link rel="stylesheet" href="style.css">

<!-- ICON LIBRARY -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="pf-login-page">

<div class="pf-login-container">

<div class="pf-logo">
    <img src="logo.png" alt="logo">
    <span class="pf-brand">PATHFINDER</span>
</div>

<h2>Login</h2>

<form action="/login" method="POST">
<!-- NAME -->

<div class="pf-input-group">

<i class="fa-solid fa-user"></i>

<input 
type="text"
placeholder="Full Name"
name="name"
autocomplete="name"
required>

</div>


<!-- EMAIL -->

<div class="pf-input-group">
        <i class="fa-solid fa-envelope"></i>
        <input 
            type="email" 
            placeholder="Email Address" 
            name="email" 
            required>
    </div>


<!-- PASSWORD -->

<div class="pf-input-group">
        <i class="fa-solid fa-lock"></i>
        <input 
            type="password" 
            id="password" 
            placeholder="Password" 
            name="password" 
            required>
        <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword()"></i>
    </div>


<button type="submit">Login</button>

    <div class="pf-forgot">
        <a href="forget-password.html" style="text-decoration:none; color:#0d1367;">Forgot password?</a>
    </div>
</form>
</div>
<script src="script.js"></script>
</body>
</html>
