<!DOCTYPE html>
<html>
<head>
    <title>Notification</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eef2f7;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #5f6f86;
            color: white;
        }

        .logo {
            font-weight: bold;
        }

        .right {
            display: flex;
            align-items: center;
        }

        /* NOTIFICATION */
        .notification {
            position: relative;
            margin-right: 20px;
            cursor: pointer;
            font-size: 18px;
        }

        .badge {
            background: red;
            border-radius: 50%;
            padding: 3px 7px;
            font-size: 12px;
            color: white;
        }

        /* DROPDOWN */
        .dropdown {
            display: none;
            position: absolute;
            top: 30px;
            right: 0;
            background: white;
            color: black;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.1);
            padding: 10px;
            z-index: 1000;
        }

        .notification:hover .dropdown {
            display: block;
        }

        .dropdown p {
            border-bottom: 1px solid #ddd;
            padding: 6px;
            margin: 0;
        }

        /* PROFILE */
        .profile {
            background: #3b4a5a;
            padding: 5px 12px;
            border-radius: 20px;
        }
    </style>

</head>

<body>

<div class="navbar">

    <div class="logo">Pathfinder</div>

    <div class="right">

        <!-- 🔔 Notification -->
        <div class="notification">
            🔔 <span class="badge">{{ count }}</span>

            <div class="dropdown">
                {% for n in notifications %}
                    <p>{{ n.message }}</p>
                {% endfor %}
            </div>
        </div>

        <!-- 👤 Profile -->
        <div class="profile">👤 User</div>

    </div>

</div>

</body>
</html>
