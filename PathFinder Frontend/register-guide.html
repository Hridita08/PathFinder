<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guide Profile | PATHFINDER</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-container">
    <h2>Guide <span>Profile</span></h2>

    <!-- ✅ Flask Connected Form -->
    <form action="/guide-create-profile" method="POST">

        <input type="text" name="name" placeholder="Guide Name" required>

        <input type="text" name="qualification" placeholder="Educational Qualification" required>

        <input type="text" name="sector" placeholder="Current Sector" required>

        <input type="email" name="email" placeholder="Guide Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="login-btn">Create Profile</button>

    </form>
</div>

</body>
</html>
