<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guide Profile | PathFinder</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="guide-page">

<div class="guide-card">

  <!-- LEFT IMAGE -->
  <div class="guide-left">
    <img src="icons/teacher.jpg" alt="Guide Photo">
  </div>

  <!-- RIGHT FORM -->
  <div class="guide-form">
    <h2>Create <span>Guide</span> Profile</h2>

    <!-- Action set kora hoyeche Python route-e -->
    <form action="/create-guide-profile" method="POST" autocomplete="off">

        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" name="name" placeholder="Guide Name" required>
        </div>

        <div class="input-box">
            <i class="fa fa-graduation-cap"></i>
            <input type="text" name="qualification" placeholder="Educational Qualification" required>
        </div>

        <div class="input-box">
            <i class="fa fa-briefcase"></i>
            <input type="text" name="sector" placeholder="Current Sector" required>
        </div>

        <div class="input-box">
            <i class="fa fa-envelope"></i>
            <input type="email" name="email" placeholder="Guide Email" required>
        </div>

        <div class="input-box password-box">
            <i class="fa fa-lock"></i>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <span class="toggle-pass" onclick="togglePassword()">
                <i class="fa fa-eye"></i>
            </span>
        </div>

        <button type="submit" class="guide-btn">Create Profile</button>

    </form>
  </div>
</div>

<script>

function togglePassword(){
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
