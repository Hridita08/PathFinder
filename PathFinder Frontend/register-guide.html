<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guide Profile | PathFinder</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Font Awesome Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="guide-page">

<div class="guide-card">

  <!-- LEFT IMAGE -->
  <div class="guide-left">
    <img src="icons/teacher.jpg" alt="Guide Photo">
  </div>

  <!-- RIGHT FORM -->
  <div class="guide-form">

    <h2>Create <span>Guide</span> Profile</h2>

    <form onsubmit="submitForm(event)" autocomplete="off">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Guide Name" autocomplete="off" required>
</div>

<div class="input-box">
<i class="fa fa-graduation-cap"></i>
<input type="text" placeholder="Educational Qualification" autocomplete="off" required>
</div>

<div class="input-box">
<i class="fa fa-briefcase"></i>
<input type="text" placeholder="Current Sector" autocomplete="off" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Guide Email" autocomplete="off" required>
</div>

<div class="input-box password-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" autocomplete="new-password" required>

<span class="toggle-pass" onclick="togglePassword()">
<i class="fa fa-eye"></i>
</span>
</div>

      <button type="submit" class="guide-btn">Create Profile</button>

    </form>

  </div>

</div>

<script>
function submitForm(e){
  e.preventDefault();
  window.location.href = "home.html";
}

function togglePassword(){
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
