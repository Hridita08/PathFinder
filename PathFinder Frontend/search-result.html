<!DOCTYPE html>
<html>
<head>
    <title>Search Result | PathFinder</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 40px; }
        .container { max-width: 900px; margin: auto; }
        h2 { color: #1f4e3b; border-bottom: 2px solid #10b981; padding-bottom: 10px; }
        .card { 
            background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 8px solid #1f4e3b;
        }
        .card b { font-size: 20px; color: #1f4e3b; }
        .sector { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 5px; font-size: 14px; margin-top: 5px; }
        .desc { margin: 15px 0; color: #666; line-height: 1.6; }
        .link-btn { 
            text-decoration: none; background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 5px; font-weight: bold; display: inline-block; transition: 0.3s;
        }
        .link-btn:hover { background: #1f4e3b; }
        .back-link { display: inline-block; margin-top: 20px; color: #1f4e3b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa fa-search"></i> Results for "{{ query }}"</h2>

    {% if results %}
        {% for item in results %}
            <div class="card">
                <b>{{ item.name }}</b><br>
                <span class="sector"><i class="fa fa-tag"></i> {{ item.sector }}</span>
                <p class="desc">{{ item.description }}</p>
                <a href="{{ item.link }}" target="_blank" class="link-btn">
                    <i class="fa fa-external-link-alt"></i> Access Resource
                </a>
            </div>
        {% endfor %}
    {% else %}
        <p style="text-align: center; padding: 50px;">No results found for <b>"{{ query }}"</b> ❌</p>
    {% endif %}

    <a href="/" class="back-link"><i class="fa fa-arrow-left"></i> Back to Home</a>
</div>

</body>
</html>
