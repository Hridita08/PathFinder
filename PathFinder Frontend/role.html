<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PathFinder | Select Role</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="role-page">

    <div class="role-container">
        <p class="subtitle">&nbsp;&nbsp;Choose Your Role&nbsp;&nbsp;</p><br><br>

        <div class="role-grid">
            <!-- Student Card -->
            <a href="student-login.html" class="role-card">
                <div class="card-img">
                    <img src="icons/student.jpg" alt="Student">
                </div>
                <div class="role-info">
                    <h2>Student</h2>
                    <p>Discover the best career path based on your skills and interests.</p>
                </div>
            </a>

            <!-- Guide Card -->
            <a href="guide-login.html" class="role-card">
                <div class="card-img">
                    <img src="icons/teacher.jpg" alt="Guide">
                </div>
                <div class="role-info">
                    <h2>Guide</h2>
                    <p>Provide career advice and help students achieve their goals.</p>
                </div>
            </a>
        </div>
    </div>

</div>

</body>
</html>
