<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | PATHFINDER</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="pf-code-page">

<div class="pf-login-container">

<div class="pf-logo">
<img src="logo.png">
<span class="pf-brand">PATHFINDER</span>
</div>

<h2>Reset Password</h2>

<p class="pf-description">
Create a strong new password
</p>

<form id="resetForm">

<div class="pf-input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="newPass" placeholder="New Password" required>
<i class="fa-solid fa-eye toggle-eye" onclick="togglePass('newPass',this)"></i>
</div>

<div class="strength-bar">
<div id="strength"></div>
</div>

<div class="pf-input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="confirmPass" placeholder="Confirm Password" required>
<i class="fa-solid fa-eye toggle-eye" onclick="togglePass('confirmPass',this)"></i>
</div>

<p id="matchMsg"></p>

<button type="submit">Update Password</button>

</form>

</div>

</div>

<script>

/* container animation */

window.addEventListener("DOMContentLoaded", () => {

const container = document.querySelector(".pf-login-container")

setTimeout(()=>{
container.classList.add("show")
},100)

})

/* show hide password */

function togglePass(id,icon){

const input = document.getElementById(id)

if(input.type==="password"){
input.type="text"
icon.classList.replace("fa-eye","fa-eye-slash")
}else{
input.type="password"
icon.classList.replace("fa-eye-slash","fa-eye")
}

}

/* password strength */

const newPass = document.getElementById("newPass")
const strength = document.getElementById("strength")

newPass.addEventListener("input",()=>{

let val = newPass.value
let score = 0

if(val.length>5) score++
if(/[A-Z]/.test(val)) score++
if(/[0-9]/.test(val)) score++
if(/[^A-Za-z0-9]/.test(val)) score++

if(score==1){
strength.style.width="25%"
strength.style.background="red"
}
else if(score==2){
strength.style.width="50%"
strength.style.background="orange"
}
else if(score==3){
strength.style.width="75%"
strength.style.background="yellowgreen"
}
else if(score==4){
strength.style.width="100%"
strength.style.background="green"
}

})

/* confirm password check */

const confirmPass = document.getElementById("confirmPass")
const msg = document.getElementById("matchMsg")

confirmPass.addEventListener("input",()=>{

if(confirmPass.value===newPass.value){
msg.innerText="Passwords match"
msg.style.color="green"
}
else{
msg.innerText="Passwords do not match"
msg.style.color="red"
}

})

/* form submit */

document.getElementById("resetForm").addEventListener("submit",(e)=>{

e.preventDefault()

if(newPass.value!==confirmPass.value){
alert("Passwords do not match")
return
}

alert("Password updated successfully!")

window.location.href="login.html"

})

</script>

</body>
</html>
