<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATHFINDER | Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="menu-section">
        <i class="fa fa-bars menu-icon" onclick="goDashboard()"></i>
        <span class="title-text">Pathfinder</span>
    </div>

    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Search...">
    </div>

    <div class="top-icons">
        <i class="fa fa-bell"></i>
        <i class="fa fa-envelope"></i>
        <span id="userDisplay"><b>{{ username }}</b></span>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div>
    <main class="content">

        <div class="post-box">
            <img src="icons/profile.png">
            <input type="text" id="postInput" placeholder="What's on your mind?">
            <button onclick="addPost()">Post</button>
        </div>

        <div id="feedArea"></div>

    </main>
</div>

<script src="script.js"></script>

<script>
// Load posts immediately when the page opens
window.onload = function() {
    loadPosts();
};

// Function to save post to MySQL
function addPost() {
    const content = document.getElementById("postInput").value;
    const username = "{{ username }}"; 

    if (!content) return;

    let formData = new FormData();
    formData.append("post_content", content);
    formData.append("username", username);

    fetch('/create-post', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success") {
            document.getElementById("postInput").value = "";
            loadPosts(); // Refresh the feed to show the new post
        }
    });
}

// Function to fetch posts from MySQL and display them
function loadPosts() {
    fetch('/get-posts')
    .then(res => res.json())
    .then(data => {
        const feedArea = document.getElementById("feedArea");
        feedArea.innerHTML = ""; 
        
        data.forEach(post => {
            const div = document.createElement("div");
            // This applies your original .post class from style.css
            div.className = "post"; 
            div.innerHTML = `
                <div style="display: flex; flex-direction: column;">
                    <strong style="color: #2563eb;">${post.username}</strong>
                    <p style="margin: 8px 0; color: #333;">${post.content}</p>
                    <small style="color: #999; font-size: 11px;">${new Date(post.created_at).toLocaleString()}</small>
                </div>
            `;
            feedArea.appendChild(div);
        });
    });
}

function logout() {
    window.location.href = "/";
}

function goDashboard(){
    window.location.href = "/";   
}
</script>
</body>
</html>
