<!DOCTYPE html>
<html>
<head>
    <title>Search Guide | PATHFINDER</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        .search-box h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .search-input {
            width: 75%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .search-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
            transition: 0.3s;
        }

        .search-btn:hover {
            opacity: 0.8;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="search-box">

        <h2>🔍 Search Guide</h2>

        <form action="/search" method="GET">
            <input class="search-input" type="text" name="query" placeholder="Search by name or sector..." required>
            <button class="search-btn" type="submit">Search</button>
        </form>

    </div>
</div>

</body>
</html>
