<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guide Profile | PATHFINDER</title>

    <!-- ✅ CSS (Flask static) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="login-container">
    <h2>Guide <span>Profile</span></h2>

    <!-- ✅ Flask Form -->
    <form action="/register-guide" method="POST">

        <input type="text" name="name" placeholder="Guide Name" required>

        <input type="text" name="qualification" placeholder="Educational Qualification" required>

        <input type="text" name="sector" placeholder="Current Sector" required>

        <input type="email" name="email" placeholder="Guide Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button class="login-btn" type="submit">Create Profile</button>

    </form>
</div>

</body>
</html>
