<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile | PATHFINDER</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="login-container">
    <h2>Student <span>Profile</span></h2>

    <!-- 🔥 IMPORTANT: Flask Form -->
    <form action="/register-student" method="POST">

        <input type="text" name="name" placeholder="Student Name" required>

        <input type="text" name="student_id" placeholder="Student ID" required>

        <input type="text" name="department" placeholder="Department" required>

        <input type="text" name="batch" placeholder="Batch (overall)" required>

        <input type="email" name="email" placeholder="Student Email" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="password" name="password" placeholder="Password" required>

        <button class="login-btn" type="submit">Create Profile</button>

    </form>
</div>

</body>
</html>
