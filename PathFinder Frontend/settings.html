<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PATHFINDER | Settings</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Body & Layout */
body { margin:0; font-family:'Segoe UI',sans-serif; transition: background 0.3s, color 0.3s; background:#f1f5f9; color:#1e293b; }
.layout { display:flex; min-height:calc(100vh - 60px); }
header.topbar { height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 20px; background:#fff; border-bottom:1px solid #e2e8f0; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.top-icons button { transition:0.3s; }
.top-icons button:hover { background:#1b5e20; color:white; }

/* Sidebar */
.sidebar { width:260px; background:#fff; border-right:1px solid #e2e8f0; padding-top:20px; }
.sidebar ul { list-style:none; padding:0; margin:0; }
.sidebar li { padding:15px 20px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:0.2s; }
.sidebar li:hover, .sidebar li.active { background:#e2e8f0; border-radius:8px; }

/* Content */
.content { flex:1; padding:40px; display:flex; justify-content:center; overflow-y:auto; }
.settings-container { width:100%; max-width:750px; background:#fff; border-radius:16px; padding:35px; box-shadow:0 6px 25px rgba(0,0,0,0.05); }

/* Headers */
.settings-header h2 { font-size:24px; display:flex; align-items:center; gap:10px; border-bottom:2px solid #f1f5f9; padding-bottom:15px; }

/* Cards */
.settings-card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:25px; margin-bottom:20px; transition:0.3s; }
.settings-card:hover { border-color:#cbd5e1; }
.settings-card h3 { font-size:16px; margin-bottom:18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #f1f5f9; padding-bottom:10px; }

/* Form */
.settings-group { margin-bottom:15px; }
.settings-group label { display:block; font-size:12px; font-weight:bold; color:#64748b; margin-bottom:6px; text-transform:uppercase; }
.settings-input, select { width:100%; padding:12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; box-sizing:border-box; transition:0.2s; }
.settings-input:focus { border-color:#2e7d32; outline:none; }

/* Buttons */
.update-btn { background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; margin-top:10px; transition:0.3s; }
.update-btn:hover { background:#1b5e20; }
.danger-btn { background:#fee2e2; color:#dc2626; border:1px solid #fecaca; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; transition:0.3s; }
.danger-btn:hover { background:#ef4444; color:white; }

/* Switch */
.flex-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.switch { position: relative; display:inline-block; width:40px; height:20px; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.4s; border-radius:20px; }
.slider:before { position:absolute; content:""; height:14px; width:14px; left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
input:checked + .slider { background:#2e7d32; }
input:checked + .slider:before { transform:translateX(20px); }

/* Dark Theme */
[data-theme="dark"] { background:#1e293b; color:#f1f5f9; }
[data-theme="dark"] .settings-container { background:#334155; color:#f1f5f9; }
[data-theme="dark"] .settings-input, [data-theme="dark"] select { background:#475569; color:#f1f5f9; border:1.5px solid #64748b; }
[data-theme="dark"] .sidebar { background:#1f2937; border-right:1px solid #334155; }
[data-theme="dark"] .sidebar li { color:#f1f5f9; }
[data-theme="dark"] .sidebar li:hover, [data-theme="dark"] .sidebar li.active { background:#334155; }

/* Modal */
#modalContainer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
#modalContainer div { background:#fff; padding:25px; border-radius:12px; max-width:400px; width:90%; text-align:center; box-shadow:0 5px 25px rgba(0,0,0,0.3); }
#modalContainer p { margin-bottom:20px; font-weight:bold; font-size:16px; }
#modalContainer button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; }
#modalCancel { background:#e2e8f0; margin-right:10px; }
#modalConfirm { background:#dc2626; color:white; }
</style>
</head>
<body>

<header class="topbar">
    <div class="menu-section">
        <i class="fa fa-bars menu-icon" onclick="window.location.href='dashboard.html'"></i>
        <span class="title-text">Pathfinder</span>
    </div>
    <div class="top-icons">
        <span id="userDisplay" style="font-weight:bold;"></span>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <ul>
            <li onclick="window.location.href='dashboard.html'"><i class="fa fa-home"></i> Home</li>
            <li onclick="window.location.href='profile.html'"><i class="fa fa-user"></i> Profile</li>
            <li class="active"><i class="fa fa-cog"></i> Settings</li>
        </ul>
    </aside>

    <main class="content">
        <div class="settings-container">
            <div class="settings-header">
                <h2><i class="fa fa-sliders"></i> Account Settings</h2>
            </div>

            <!-- Security -->
            <div class="settings-card">
                <h3><i class="fa fa-lock"></i> Security</h3>
                <div class="settings-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" class="settings-input" placeholder="Min. 6 characters">
                </div>
                <div class="settings-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPass" class="settings-input" placeholder="Repeat new password">
                </div>
                <button class="update-btn" onclick="updatePassword()">Update Password</button>
            </div>

            <!-- Preferences -->
            <div class="settings-card">
                <h3><i class="fa fa-palette"></i> Preferences</h3>
                <div class="flex-row">
                    <span>Email Notifications</span>
                    <label class="switch">
                        <input type="checkbox" id="emailToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-group">
                    <label>App Theme</label>
                    <select id="themeSelect">
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                    </select>
                </div>
            </div>

            <!-- Privacy -->
            <div class="settings-card">
                <h3><i class="fa fa-shield-halved"></i> Privacy</h3>
                <div class="flex-row">
                    <span>Public Profile Visibility</span>
                    <label class="switch">
                        <input type="checkbox" id="profileToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="flex-row">
                    <span>Show ID to Recruiters</span>
                    <label class="switch">
                        <input type="checkbox" id="idToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="settings-card" style="border-color:#fecaca; background:#fffafb;">
                <h3 style="color:#dc2626;"><i class="fa fa-triangle-exclamation"></i> Danger Zone</h3>
                <p style="font-size:13px; color:#64748b; margin-bottom:15px;">Deactivating your account will remove your data permanently.</p>
                <button class="danger-btn" onclick="deleteAccount()">Delete My Account</button>
            </div>

            <p id="statusMsg" style="text-align:center; font-weight:bold; font-size:14px; margin-top:10px;"></p>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="modalContainer">
    <div>
        <p id="modalMessage"></p>
        <div style="display:flex; justify-content:center; gap:15px;">
            <button id="modalCancel">Cancel</button>
            <button id="modalConfirm">Confirm</button>
        </div>
    </div>
</div>

<script>
// Load username
document.getElementById("userDisplay").innerText = localStorage.getItem("username") || "User";

// Theme
const themeSelect = document.getElementById("themeSelect");
document.body.setAttribute("data-theme", localStorage.getItem("appTheme") || "light");
themeSelect.value = localStorage.getItem("appTheme") || "light";
themeSelect.addEventListener("change", () => {
    const theme = themeSelect.value;
    document.body.setAttribute("data-theme", theme);
    localStorage.setItem("appTheme", theme);
});

// Toggles
const emailToggle = document.getElementById("emailToggle");
const profileToggle = document.getElementById("profileToggle");
const idToggle = document.getElementById("idToggle");

emailToggle.checked = JSON.parse(localStorage.getItem("emailNotif")) ?? true;
profileToggle.checked = JSON.parse(localStorage.getItem("publicProfile")) ?? true;
idToggle.checked = JSON.parse(localStorage.getItem("showID")) ?? false;

emailToggle.addEventListener("change", () => localStorage.setItem("emailNotif", emailToggle.checked));
profileToggle.addEventListener("change", () => localStorage.setItem("publicProfile", profileToggle.checked));
idToggle.addEventListener("change", () => localStorage.setItem("showID", idToggle.checked));

// Password update
function updatePassword() {
    const p1 = document.getElementById("newPass").value;
    const p2 = document.getElementById("confirmPass").value;
    const status = document.getElementById("statusMsg");

    if(p1.length < 6) { status.style.color="#dc2626"; status.innerText="Password must be at least 6 characters!"; return; }
    if(p1!==p2) { status.style.color="#dc2626"; status.innerText="Passwords do not match!"; return; }

    localStorage.setItem("userPassword", p1);
    status.style.color="#16a34a";
    status.innerText="Password updated successfully!";
    document.getElementById("newPass").value="";
    document.getElementById("confirmPass").value="";
}

// Modal logic
const modalContainer = document.getElementById("modalContainer");
const modalMessage = document.getElementById("modalMessage");
const modalCancel = document.getElementById("modalCancel");
const modalConfirm = document.getElementById("modalConfirm");

function showModal(message, callback) {
    modalMessage.innerText = message;
    modalContainer.style.display="flex";

    function confirmHandler(){ callback(); closeModal(); }
    function closeModal(){ modalContainer.style.display="none"; modalConfirm.removeEventListener("click", confirmHandler); modalCancel.removeEventListener("click", closeModal); }

    modalConfirm.addEventListener("click", confirmHandler);
    modalCancel.addEventListener("click", closeModal);
}

// Delete account
function deleteAccount() {
    showModal("Are you absolutely sure? This action is permanent!", () => {
        localStorage.clear();
        window.location.href="login.html";
    });
}

// Logout
function logout() {
    showModal("Do you want to logout?", () => {
        window.location.href="login.html";
    });
}
</script>

</body>
</html>
