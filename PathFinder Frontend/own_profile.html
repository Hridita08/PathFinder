<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATHFINDER | Profile</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    /* Profile Specific UI Fixes */
    .profile-container { width: 100%; max-width: 800px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: 20px auto; }
    .cover-photo { height: 140px; background: linear-gradient(135deg, #1e293b, #2e7d32); }
    .profile-header-main { padding: 0 30px 20px; text-align: left; }
    .profile-img-wrapper { position: relative; margin-top: -65px; display: inline-block; }
    .profile-img-main { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; background: #f8fafc; object-fit: cover; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 30px 25px; }
    .info-card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
    .info-card label { display: block; font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
    .info-card span { font-weight: 600; color: #1e293b; font-size: 14px; }
    
    /* Edit Modal Fix */
    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .edit-group { margin-bottom: 12px; text-align: left; }
    .edit-group label { font-size: 12px; font-weight: bold; color: #334155; display: block; margin-bottom: 5px; }
    .edit-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
</style>
</head>
<body>

<header class="topbar">
    <div class="menu-section">
        <i class="fa fa-bars menu-icon" onclick="window.location.href='dashboard.html'"></i>
        <span class="title-text">Pathfinder</span>
    </div>
    <div class="top-icons">
        <span id="userDisplay" style="font-weight:bold;"></span>
        <button onclick="logout()" style="margin-left:15px; background:#2e7d32; color:white; border:none; padding:6px 15px; border-radius:20px; cursor:pointer;">Logout</button>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <ul>
            <li onclick="window.location.href='dashboard.html'"><i class="fa fa-home"></i> Home</li>
            <li class="active"><i class="fa fa-user"></i> Profile</li>
            <li onclick="window.location.href='settings.html'"><i class="fa fa-cog"></i> Settings</li>
        </ul>
    </aside>

    <main class="content">
        <div class="profile-container">
            <div class="cover-photo"></div>
            <div class="profile-header-main">
                <div class="profile-img-wrapper">
                    <img src="icons/profile.png" id="mainProfilePic" class="profile-img-main">
                    <div class="camera-badge" onclick="openModal()" style="position: absolute; bottom: 8px; right: 5px; background: #2563eb; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white; cursor: pointer;">
                        <i class="fa fa-camera" style="font-size: 12px;"></i>
                    </div>
                </div>
                <div style="margin-top:10px;">
                    <h2 id="profileName">Loading...</h2>
                    <p id="profileDept" style="color: #64748b; font-size: 14px;">Computer Science & Engineering | BAUET</p>
                </div>
            </div>

            <div class="profile-grid">
                <div class="info-card">
                    <label>Student ID</label>
                    <span id="profileID">12345678</span>
                </div>
                <div class="info-card">
                    <label>Email Address</label>
                    <span id="profileEmail">student@bauet.ac.bd</span>
                </div>
                <div class="info-card" style="grid-column: span 2;">
                    <label>Institution</label>
                    <span id="profileInst">Bangladesh Army University of Engineering & Technology (BAUET)</span>
                </div>
            </div>

            <div style="padding: 0 30px 30px;">
                <button onclick="openModal()" style="width:100%; background:#1e293b; color:white; padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <i class="fa fa-pen"></i> Edit Full Profile
                </button>
            </div>
        </div>
    </main>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; color:#1e293b;">Update Information</h3>
        
        <div class="edit-group">
            <label>Profile Image</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="edit-group">
            <label>Full Name</label>
            <input type="text" id="editName">
        </div>
        <div class="edit-group">
            <label>Student ID</label>
            <input type="text" id="editID">
        </div>
        <div class="edit-group">
            <label>Department</label>
            <input type="text" id="editDept">
        </div>
        <div class="edit-group">
            <label>Email</label>
            <input type="email" id="editEmail">
        </div>

        <button onclick="saveChanges()" style="width:100%; padding:12px; background:#2e7d32; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px;">Save All Changes</button>
        <p onclick="closeModal()" style="text-align:center; margin-top:12px; color:#64748b; cursor:pointer; font-size:13px;">Cancel</p>
    </div>
</div>

<script>
   function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("mainContent").classList.toggle("shifted");
    }

    function toggleCareerDropdown() {
        const dropdown = document.getElementById("careerDropdown");
        dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
        document.getElementById("dropIcon").style.transform = (dropdown.style.display === "block") ? "rotate(180deg)" : "rotate(0deg)";
    }

   
    async function loadData() {
        try {
            const response = await fetch('/get_profile_data');
            const data = await response.json();

            if (data) {
                document.getElementById("topUserNameDisplay").innerText = data.full_name || "User";
                document.getElementById("profileName").innerText = data.full_name || "User";
                document.getElementById("profileEmail").innerText = data.email || "Not Provided";
                document.getElementById("profileID").innerText = data.student_id || "Not Set";
                document.getElementById("profileDept").innerText = (data.department || "Dept") + " | BAUET";
                
                const profileImg = data.profile_pic ? `data:image/jpeg;base64,${data.profile_pic}` : "icons/profile.png";
                document.getElementById("mainProfilePic").src = profileImg;
                document.getElementById("topNavPic").src = profileImg;
            }
        } catch (error) {
            console.error("Error loading data:", error);
        }

       
        const theme = localStorage.getItem("appTheme") || "light";
        if(theme === "dark") document.body.classList.add("dark-theme");
    }

    function openModal() {
        document.getElementById("editModal").style.display = "block";
        if(mode === 'image') {
            document.getElementById("imageSection").classList.remove("hidden");
            document.getElementById("infoSection").classList.add("hidden");
            document.getElementById("modalTitle").innerText = "Update Profile Picture";
        } else {
            document.getElementById("imageSection").classList.add("hidden");
            document.getElementById("infoSection").classList.remove("hidden");
            document.getElementById("modalTitle").innerText = "Update Information";
            
            
            document.getElementById("editName").value = document.getElementById("profileName").innerText;
            document.getElementById("editID").value = document.getElementById("profileID").innerText;
            document.getElementById("editEmail").value = document.getElementById("profileEmail").innerText;
            document.getElementById("editDept").value = document.getElementById("profileDept").innerText.split(" | ")[0];
        }
    }

    function closeModal() { document.getElementById("editModal").style.display = "none"; }
async function removeProfilePic() {
    if(confirm("Confirm to remove photo?")) {
        try {
            const response = await fetch('/remove_profile_pic', {
                method: 'POST'
            });
            const result = await response.json();
            
            if(result.status === "success") {
                alert("Photo is removed!");
                loadData();
                closeModal();
            }
        } catch (error) {
            alert("Error removing photo!");
        }
    }
}
    
    async function saveChanges() {
        const formData = new FormData();
        
        if(!document.getElementById("infoSection").classList.contains("hidden")) {
            formData.append('name', document.getElementById("editName").value);
            formData.append('student_id', document.getElementById("editID").value);
            formData.append('email', document.getElementById("editEmail").value);
            formData.append('dept', document.getElementById("editDept").value);
        }

        const imgInput = document.getElementById("imageInput");
        if (!document.getElementById("imageSection").classList.contains("hidden") && imgInput.files[0]) {
            formData.append('image', imgInput.files[0]);
        }

        try {
            const response = await fetch('/update_profile', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if(result.status === "success") {
                alert("Profile Updated Successfully!");
                loadData();
                closeModal();
            }
        } catch (error) {
            alert("Update failed!");
        }
    }

    function logout() {
        if(confirm("Are You Sure?")) {
            window.location.href = "login.html";
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
