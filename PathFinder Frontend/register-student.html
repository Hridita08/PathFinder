<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile | PathFinder</title>

<link rel="stylesheet" href="style.css">

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="login-body">

<div class="profile-card">

<!-- LEFT IMAGE -->

<div class="profile-image">
<img src="icons/student.jpg" alt="student">
</div>

<!-- RIGHT FORM -->

<div class="profile-form">

<h2>Create <span>Student Profile</span></h2>

<form onsubmit="submitForm(event)">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Student Name" required>
</div>

<div class="input-box">
<i class="fa fa-id-card"></i>
<input type="text" placeholder="Student ID" required>
</div>

<div class="input-box">
<i class="fa fa-building"></i>
<select required>
<option value="">Department</option>
<option>CE</option>
<option>CSE</option>
<option>EEE</option>
<option>ME</option>
<option>ICE</option>
</select>
</div>

<div class="input-box">
<i class="fa fa-graduation-cap"></i>
<input type="batch" placeholder="Bath(overall)" required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" required>
</div>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="tel" placeholder="Phone Number" required>
</div>

<div class="input-box password-box">

<i class="fa fa-lock"></i>

<input type="password" placeholder="Password" id="password" required>

<i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>

</div>

<button type="submit" class="login-btn">Create Profile</button>

</form>

</div>
</div>
<script>

function submitForm(e){
e.preventDefault();
window.location.href="home.html";
}

</script>
<script>

function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}
else{
pass.type = "password";
}
}

</script>

</body>
</html>
