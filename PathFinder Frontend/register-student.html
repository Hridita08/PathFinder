<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile | PATHFINDER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <h2>Student <span>Profile</span></h2>

    <form action="/create-profile" method="POST">
        
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="text" name="student_id" placeholder="Student ID" required>
        <input type="text" name="dept" placeholder="Department" required>
        <input type="text" name="batch" placeholder="Batch (overall)" required>
        <input type="email" name="email" placeholder="Student Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit" class="login-btn">Create Profile</button>
    </form>
</div>

</body>
</html>
