<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile | PathFinder</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="student-page">

<div class="profile-card">

    <!-- LEFT IMAGE -->
    <div class="profile-image">
        <img src="icons/student.png" alt="Student Photo">
    </div>

    <!-- RIGHT FORM -->
    <div class="profile-form">
        
        <h2>Create <span>Student</span> Profile</h2>

        <!-- Action: Python route, Method: POST for security -->
        <form action="/create-profile" method="POST" autocomplete="off">

            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" name="name" placeholder="Student Name" required>
            </div>

            <div class="input-box">
                <i class="fa fa-id-card"></i>
                <input type="text" name="student_id" placeholder="Student ID" required>
            </div>

            <div class="input-box">
                <i class="fa fa-building"></i>
                <select name="dept" required>
                    <option value="">Department</option>
                    <option value="CE">CE</option>
                    <option value="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="ME">ME</option>
                    <option value="ICE">ICE</option>
                </select>
            </div>

            <div class="input-box">
                <i class="fa fa-graduation-cap"></i>
                <input type="text" name="batch" placeholder="Batch (Overall)" required>
            </div>

            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <i class="fa fa-phone"></i>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="input-box password-box">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <button type="submit" class="login-btn">Create Profile</button>

        </form>
    </div>

</div>

<script>
// Password toggle logic
function togglePassword(){
    let pass = document.getElementById("password");
    let icon = document.querySelector(".toggle-password i");
    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>

</body>
</html>
