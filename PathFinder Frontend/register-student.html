<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile | PathFinder</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */
.student-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#27a630bd,#c2e9fb);
  font-family: 'Poppins', sans-serif;
  position: relative;
  overflow: hidden;
}

.student-page::before {
  content: '';
  position: absolute;
  width:600px; height:600px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  top:-200px; left:-200px;
}

.student-page::after {
  content:'';
  position:absolute;
  width:400px; height:400px;
  background:rgba(46,125,50,0.15);
  border-radius:50%;
  bottom:-150px; right:-150px;
}

/* ================= CARD ================= */
.profile-card{
  display:flex;
  width:900px;
  max-width:95%;
  background:rgba(255,255,255,0.95);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  z-index:1;
}

/* ================= IMAGE ================= */
.profile-image{ width:45%; animation:slideLeft 1s ease;}
.profile-image img{ width:100%; height:100%; object-fit:cover; }

/* ================= FORM ================= */
.profile-form{
  width:55%;
  padding:35px;
  animation:slideRight 1s ease;
}

.profile-form h2 {
  text-align:center;
  color:#333;
}

.profile-form h2 span {
  color:#2e7d32;
}

/* ================= INPUT ================= */
.profile-form .input-box{
  position:relative;
  margin:12px 0;
  display:flex;
  align-items:center;
}

.profile-form .input-box i{
  position:absolute; 
  left:15px; 
  top:50%; 
  transform:translateY(-50%);
  color:#666;
}

.profile-form input,
.profile-form select{
  width:100%;
  padding:12px 45px;
  border-radius:12px;
  border:2px solid #cce5cc;
  background:#f0f9f0;
  font-size:16px;
  outline:none;
  transition:0.3s;
}

.profile-form input:focus,
.profile-form select:focus{
  border-color:#2e7d32;
  background:#ffffff;
  box-shadow:0 0 8px rgba(46,125,50,0.3);
}

/* ================= PASSWORD ================= */
.password-box { position:relative; }

.password-box .toggle-password{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#2e7d32;
}

/* ================= BUTTON ================= */
.login-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:25px;
  margin-top:15px;
  background:linear-gradient(90deg,#2e7d32,#66bb6a);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.login-btn:hover{ 
  background:#1b5e20; 
}

/* ================= ANIMATION ================= */
@keyframes slideLeft{
  from{ transform:translateX(-50px); opacity:0; }
  to{ transform:translateX(0); opacity:1; }
}

@keyframes slideRight{
  from{ transform:translateX(50px); opacity:0; }
  to{ transform:translateX(0); opacity:1; }
}

</style>

</head>

<body class="student-page">

<div class="profile-card">

  <!-- LEFT IMAGE -->
  <div class="profile-image">
    <img src="icons/student.png" alt="Student Photo">
  </div>

  <!-- FORM -->
  <div class="profile-form">
    
    <h2>Create <span>Student</span> Profile</h2>

    <form action="/create-profile" method="POST">

      <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="text" name="name" placeholder="Student Name" required>
      </div>

      <div class="input-box">
        <i class="fa fa-id-card"></i>
        <input type="text" name="student_id" placeholder="Student ID" required>
      </div>

      <div class="input-box">
        <i class="fa fa-building"></i>
        <select name="dept" required>
          <option value="">Department</option>
          <option>CE</option>
          <option>CSE</option>
          <option>EEE</option>
          <option>ME</option>
          <option>ICE</option>
        </select>
      </div>

      <div class="input-box">
        <i class="fa fa-graduation-cap"></i>
        <input type="text" name="batch" placeholder="Batch (Overall)" required>
      </div>

      <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" name="email" placeholder="Student Email" required>
      </div>

      <div class="input-box">
        <i class="fa fa-phone"></i>
        <input type="text" name="phone" placeholder="Phone Number" required>
      </div>

      <div class="input-box password-box">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Password" required>

        <span class="toggle-password" onclick="togglePassword()">
          <i class="fa fa-eye"></i>
        </span>
      </div>

      <button type="submit" class="login-btn">Create Profile</button>

    </form>

  </div>

</div>

<script>
function togglePassword(){
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
