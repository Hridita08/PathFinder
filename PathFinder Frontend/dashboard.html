<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PATHFINDER | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="menu-section">
        <i class="fa fa-bars menu-icon" onclick="goDashboard()"></i>
        <span class="title-text">Pathfinder</span>
    </div>

    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Search...">
    </div>

    <div class="top-icons">
        <i class="fa fa-bell"></i>
        <i class="fa fa-envelope"></i>
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <ul>
            <li class="active" onclick="setActive(this); window.location.href='home.html'">
                <i class="fa fa-home"></i> Home
            </li>

            <li onclick="setActive(this); window.location.href='profile.html'">
                <i class="fa fa-user"></i> Profile
            </li>

            <!-- Saved Posts Option -->
            <li onclick="window.location.href='saved_posts.html'">
                <i class="fa fa-bookmark"></i> Saved Posts
            </li>

            <li onclick="toggleDropdown()">
                <i class="fa fa-graduation-cap"></i> Career Paths
                <i class="fa fa-chevron-down arrow"></i>
            </li>

            <ul class="dropdown" id="careerDropdown">
                <li>Technical</li>
                <li>Non-Technical</li>
            </ul>

            <li onclick="setActive(this); window.location.href='settings.html'">
                <i class="fa fa-cog"></i> Settings
            </li>
        </ul>
    </aside>

    <main class="content">
        <div class="post-box">
            <img src="icons/profile.png" alt="Profile">
            <input type="text" id="postInput" placeholder="What's on your mind?">
            <button onclick="addPost()">Post</button>
        </div>

        <div id="feedArea">
            <!-- Posts will be loaded here from script.js -->
        </div>
    </main>
</div>

<script src="script.js"></script>

<script>
    // Authentication Check
    const username = localStorage.getItem("username");
    if(!username){ 
        window.location.href="login.html"; 
    }
    document.getElementById("userDisplay").innerText = username;

    function goDashboard(){
        window.location.href="main.html";
    }

    // --- Save Post Function ---
    function savePost(postId) {
        const currentUsername = localStorage.getItem("username");

        fetch('/save-post', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `post_id=${postId}&username=${encodeURIComponent(currentUsername)}`
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Server connection failed.");
        });
    }

    // --- Add Post Function ---
    function addPost() {
        const postInput = document.getElementById("postInput");
        const postContent = postInput.value;
        const currentUsername = localStorage.getItem("username");

        if (!postContent) {
            alert("Please write something first!");
            return;
        }

        fetch('/create-post', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `post_content=${encodeURIComponent(postContent)}&username=${encodeURIComponent(currentUsername)}`
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                postInput.value = ""; 
                alert("Post shared successfully!");
                location.reload(); 
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Server connection failed.");
        });
    }

    function logout() {
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
