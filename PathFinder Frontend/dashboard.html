<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATHFINDER | Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="topbar">

    <div class="menu-section">
        <i class="fa fa-bars menu-icon" onclick="goDashboard()"></i>
        <span class="title-text">Pathfinder</span>
    </div>

    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Search...">
    </div>

    <div class="top-icons">
        <i class="fa fa-bell"></i>
        <i class="fa fa-envelope"></i>
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="layout">

    <aside class="sidebar">
        <ul>
            <li class="active" onclick="setActive(this); window.location.href='home.html'">
                <i class="fa fa-home"></i> Home
            </li>

            <li onclick="setActive(this); window.location.href='profile.html'">
                <i class="fa fa-user"></i> Profile
            </li>

            <li onclick="toggleDropdown()">
                <i class="fa fa-graduation-cap"></i> Career Paths
                <i class="fa fa-chevron-down arrow"></i>
            </li>

            <ul class="dropdown" id="careerDropdown">
                <li>Technical</li>
                <li>Non-Technical</li>
            </ul>

            <li onclick="setActive(this); window.location.href='settings.html'">
                <i class="fa fa-cog"></i> Settings
            </li>
        </ul>
    </aside>

    <main class="content">

        <div class="post-box">
            <img src="icons/profile.png">
            <input type="text" id="postInput" placeholder="What's on your mind?">
            <button onclick="addPost()">Post</button>
        </div>

        <div id="feedArea"></div>

    </main>
</div>

<script src="script.js"></script>

<script>
const username = localStorage.getItem("username");
if(!username){ window.location.href="login.html"; }
document.getElementById("userDisplay").innerText=username;

function goDashboard(){
    window.location.href="main.html";
}
</script>

</body>
</html>
